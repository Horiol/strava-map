<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="55%" stop-color="#fc4c02"/>
      <stop offset="100%" stop-color="#7a2400"/>
    </linearGradient>
  </defs>
  <!--
    Full-bleed background so Android's adaptive-icon mask (which crops
    to a circle or squircle at roughly the inner 80% radius) still has
    gradient to show. The route line and pin stay well within the
    safe zone so they're not clipped regardless of the mask shape.
  -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <path
    d="M 128 332 L 200 220 L 280 292 L 352 208"
    fill="none"
    stroke="#ffffff"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <circle cx="352" cy="208" r="32" fill="#ffffff"/>
  <circle cx="352" cy="208" r="16" fill="#fc4c02"/>
</svg>
